<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servientrega</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="banner">
                <img src="../img/logo.jpeg" alt="Envios Servientrega">
            </div>
        </header>

        <div class="barra-iconos">

            <a href="../index.html">
                <img src="../img/casa.png" alt="home">
            </a>

            <a href="contacto.html">
                <img src="../img/telefono.png" alt="Teléfono">
            </a>

            <a href="servicio.html">
                <img src="../img/persona.png" alt="Usuario">
            </a>

        </div>

        <h2 style="text-align: center;">Formulario de Contacto</h2>
        <form action="#">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>

        <label for="apellido">Apellido</label>
        <input type="text" id="apellido" name="apellido" placeholder="Tu apellido" required>

        <label for="tipo_doc">Tipo de documento</label>
        <select id="tipo_doc" name="tipo_doc">
            <option value="CC">Cédula de ciudadanía</option>
            <option value="TI">Tarjeta de identidad</option>
            <option value="CE">Cédula de extranjería</option>
        </select>

        <label for="num_doc">Número de documento</label>
        <input type="number" id="num_doc" name="num_doc" placeholder="Digita SU número" required>

        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="gmail@correo.com" required>

        <input type="submit" value="Enviar Registro">
        </form>

         <footer>
            <div class="redes">
                <a href="https://web.facebook.com/Servientrega.ms">
                <img src="../img/facebook.png" alt="Facebook">
                </a>

                <a href="https://www.instagram.com/servientrega.ms/">
                <img src="../img/instagram.png" alt="Instagram">
                </a>

                <a href="https://x.com/Servientrega_ms">
                <img src="../img/twitter.png" alt="Twitter">
                </a>
            </div>

            <p>&copy; 2024 Servientrega. pagina web creada por jhojan dodino, kelly criado, helena serrano </p>
            <audio controls>
                <source src="../Musica/I WANNA BE YOUR.mp3" type="audio/mpeg">
            </audio>
        </footer>
    </div>
</body>
</html>
